# This file is managed by the Tools repo. Copy to other repos via .\install-precommit-all.ps1
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: "^(configuration\\.yaml|AC Cooling Buildout/.*\\.yaml)$"
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
