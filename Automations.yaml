    - service: input_number.set_value
      target:
        entity_id: input_number.gas_bill_days_previous
      data:
        value: 30
    - service: input_number.set_value
      target:
        entity_id: input_number.gas_bill_amount_last_year
      data:
        value: >
          {% set archive_val = states('input_number.gas_archive_' ~ (month_name | trim) ~ '_amount') | float(0) %}
          {{ archive_val if archive_val != current_amount else states('input_number.gas_bill_amount_last_year') | float(0) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.gas_bill_ccf_last_year
      data:
        value: >
          {% set archive_val = states('input_number.gas_archive_' ~ (month_name | trim) ~ '_ccf') | float(0) %}
          {{ archive_val if archive_val != current_ccf else states('input_number.gas_bill_ccf_last_year') | float(0) }}
    - service: input_number.set_value
      target:
        entity_id: "input_number.gas_archive_{{ month_name | trim }}_amount"
      data:
        value: "{{ current_amount }}"
    - service: input_number.set_value
      target:
        entity_id: "input_number.gas_archive_{{ month_name | trim }}_ccf"
      data:
        value: "{{ current_ccf }}"
    - service: persistent_notification.create
      data:
        title: "✅ Gas Bill Saved"
        message: "{{ (month_name | trim) | upper }}: ${{ current_amount }}, {{ current_ccf }} CCF archived"

# ===============================================================
# DHW ARCHIVE (Navien - separate from gas bill)
# ===============================================================
# Enter DHW reading on 1st of month for previous month
# Reduces billing period misalignment to ~2-3 weeks
- id: save_dhw_button
  alias: "Save DHW (Navien) - Button Press"
  trigger:
    - platform: state
      entity_id: input_button.save_dhw
  action:
    - variables:
        # Previous month (since entering on 1st for prior month)
        prev_month: "{{ now().month - 1 if now().month > 1 else 12 }}"
        # Convert Therms to CCF: 1 Thm = 100,000 BTU, 1 CCF = 103,700 BTU
        input_thm: "{{ states('input_number.dhw_bill_thm') | float(0) }}"
        current_dhw: "{{ (input_thm * 0.9643) | round(2) }}"
        month_name: >
          {% set months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'] %}
          {{ months[(prev_month | int) - 1] }}
        prev_dhw: "{{ states('input_number.dhw_archive_' ~ month_name) | float(0) }}"
    - condition: template
      value_template: "{{ input_thm > 0 }}"
    - service: input_number.set_value
      target:
        entity_id: "input_number.dhw_archive_{{ month_name | trim }}"
      data:
        value: "{{ current_dhw }}"
    - service: input_number.set_value
      target:
        entity_id: "input_number.dhw_op_hrs_archive_{{ month_name | trim }}"
      data:
        value: "{{ states('input_number.dhw_op_hrs_bill') | float(0) }}"
    - service: input_number.set_value
      target:
        entity_id: "input_number.dhw_recirc_hrs_archive_{{ month_name | trim }}"
      data:
        value: "{{ states('input_number.dhw_recirc_hrs_bill') | float(0) }}"
    - service: persistent_notification.create
      data:
        title: "✅ DHW Archived"
        message: >
          {{ (month_name | trim) | upper }}: {{ input_thm }} Thm = {{ current_dhw }} CCF
          {% if prev_dhw > 0 %}(was {{ prev_dhw }} CCF){% endif %}

# ===============================================================
# ALERT AUTOMATIONS
