# ===============================================================
# COMPLETE AUTOMATIONS.YAML - ENERGY MONITORING
# ===============================================================
# Includes: Bill saving, Auto HDD tracking, Alerts, Reminders + Santa Fe Dehumidifier
# ===============================================================

# ===============================================================
# OUTDOOR TEMP DAILY HIGH/LOW TRACKING
# ===============================================================
- id: update_outdoor_temp_daily_high_low
  alias: "Update Outdoor Temp Daily High/Low"
  description: "Updates daily high/low every 10 minutes based on actual observed temps"
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/10"
    - platform: homeassistant
      event: start
  action:
    - variables:
        current_temp: "{{ states('sensor.hvac_outdoor_temp_hartford_proxy') | float(none) }}"
        current_high: "{{ states('input_number.outdoor_temp_daily_high') | float(-50) }}"
        current_low: "{{ states('input_number.outdoor_temp_daily_low') | float(150) }}"
        # Detect corrupt/uninitialized values (at initial extremes)
        high_is_corrupt: "{{ current_high <= -49 }}"
        low_is_corrupt: "{{ current_low >= 149 }}"
    - choose:
        # Update high if: new high OR high was corrupt/uninitialized
        - conditions:
            - condition: template
              value_template: "{{ current_temp is not none and (current_temp > current_high or high_is_corrupt) }}"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_daily_high
              data:
                value: "{{ current_temp | round(1) }}"
            - if:
                - condition: template
                  value_template: "{{ high_is_corrupt }}"
              then:
                - service: system_log.write
                  data:
                    message: "Outdoor temp daily high was corrupt (-50), initialized to {{ current_temp | round(1) }}°F"
                    level: warning
    - choose:
        # Update low if: new low OR low was corrupt/uninitialized
        - conditions:
            - condition: template
              value_template: "{{ current_temp is not none and (current_temp < current_low or low_is_corrupt) }}"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_daily_low
              data:
                value: "{{ current_temp | round(1) }}"
            - if:
                - condition: template
                  value_template: "{{ low_is_corrupt }}"
              then:
                - service: system_log.write
                  data:
                    message: "Outdoor temp daily low was corrupt (150), initialized to {{ current_temp | round(1) }}°F"
                    level: warning

- id: reset_outdoor_temp_daily_high_low
  alias: "Reset Outdoor Temp Daily High/Low"
  description: "Resets daily high/low at midnight for new day"
  mode: single
  trigger:
    - platform: time
      at: "00:00:30"
  action:
    - variables:
        current_temp: "{{ states('sensor.hvac_outdoor_temp_hartford_proxy') | float(none) }}"
        sensor_valid: "{{ current_temp is not none and current_temp > -40 and current_temp < 120 }}"
    - choose:
        # Sensor available and valid - reset to current temp
        - conditions:
            - condition: template
              value_template: "{{ sensor_valid }}"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_daily_high
              data:
                value: "{{ current_temp | round(1) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_daily_low
              data:
                value: "{{ current_temp | round(1) }}"
            - service: system_log.write
              data:
                message: "Daily outdoor temp high/low reset to {{ current_temp }}°F"
                level: info
      # Sensor unavailable - reset to initial values (update automation will fix when sensor returns)
      default:
        - service: input_number.set_value
          target:
            entity_id: input_number.outdoor_temp_daily_high
          data:
            value: -50
        - service: input_number.set_value
          target:
            entity_id: input_number.outdoor_temp_daily_low
          data:
            value: 150
        - service: system_log.write
          data:
            message: "Outdoor temp sensor unavailable at midnight reset - using initial values (will auto-correct when sensor available)"
            level: warning

# ===============================================================
# AUTO HDD TRACKING - Daily capture at 11:55 PM (HARDENED)
# ===============================================================
- id: capture_daily_hdd
  alias: "Capture Daily HDD/CDD"
  description: "Records daily HDD/CDD and updates rolling/cumulative totals"
  mode: single
  trigger:
    - platform: time
      at: "23:55:00"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {% set proxy = states('sensor.hvac_outdoor_temp_hartford_proxy') %}
                {% set hdd = states('sensor.hvac_hdd65_today') %}
                {% set cdd = states('sensor.hvac_cdd65_today') %}
                {% set hdd_val = hdd | float(-1) %}
                {% set cdd_val = cdd | float(-1) %}
                {% set cum_month = states('input_number.hdd_cumulative_month_auto') | float(0) %}
                {% set cum_year = states('input_number.hdd_cumulative_year_auto') | float(0) %}
                {# Upstream validation: outdoor temp proxy must be available #}
                {% set upstream_ok = proxy not in ['unknown', 'unavailable'] %}
                {# Value validation: HDD/CDD must be valid numbers in range #}
                {% set values_ok = is_number(hdd) and is_number(cdd) and
                   0 <= hdd_val <= 65 and 0 <= cdd_val <= 50 %}
                {# Delta validation: new cumulative shouldn't exceed reasonable bounds #}
                {% set delta_ok = (cum_month + hdd_val) <= 2500 and (cum_year + hdd_val) <= 8000 %}
                {{ upstream_ok and values_ok and delta_ok }}
          sequence:
            - variables:
                todays_hdd: "{{ states('sensor.hvac_hdd65_today')|float }}"
                todays_cdd: "{{ states('sensor.hvac_cdd65_today')|float }}"
                d1: "{{ states('input_number.hdd_day_1')|float(0) }}"
                d2: "{{ states('input_number.hdd_day_2')|float(0) }}"
                d3: "{{ states('input_number.hdd_day_3')|float(0) }}"
                d4: "{{ states('input_number.hdd_day_4')|float(0) }}"
                d5: "{{ states('input_number.hdd_day_5')|float(0) }}"
                d6: "{{ states('input_number.hdd_day_6')|float(0) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_7
              data:
                value: "{{ d6 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_6
              data:
                value: "{{ d5 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_5
              data:
                value: "{{ d4 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_4
              data:
                value: "{{ d3 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_3
              data:
                value: "{{ d2 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_2
              data:
                value: "{{ d1 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_day_1
              data:
                value: "{{ todays_hdd }}"
            # HDD/CDD accumulators moved to capture_daily_monthly_tracking (23:56:30)
            # to eliminate desync with furnace runtime accumulators
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.hdd_capture_last_ok
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              HDD/CDD capture skipped - Outdoor proxy={{ states('sensor.hvac_outdoor_temp_hartford_proxy') }},
              HDD={{ states('sensor.hvac_hdd65_today') }},
              CDD={{ states('sensor.hvac_cdd65_today') }},
              Cum_Month={{ states('input_number.hdd_cumulative_month_auto') }},
              Cum_Year={{ states('input_number.hdd_cumulative_year_auto') }}

# AUTO CDD TRACKING - Daily capture at 11:55:15 PM (mirrors capture_daily_hdd)
# ===============================================================
- id: capture_daily_cdd
  alias: "Capture Daily CDD"
  description: "Shifts 7-day CDD sliding window and captures today's CDD value"
  mode: single
  trigger:
    - platform: time
      at: "23:55:15"
  action:
    - variables:
        todays_cdd: "{{ states('sensor.hvac_cdd65_today') | float(-1) }}"
        proxy_ok: "{{ states('sensor.hvac_outdoor_temp_hartford_proxy') not in ['unknown', 'unavailable'] }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ proxy_ok and todays_cdd >= 0 and todays_cdd <= 50 }}"
          sequence:
            - variables:
                d1: "{{ states('input_number.cdd_day_1')|float(0) }}"
                d2: "{{ states('input_number.cdd_day_2')|float(0) }}"
                d3: "{{ states('input_number.cdd_day_3')|float(0) }}"
                d4: "{{ states('input_number.cdd_day_4')|float(0) }}"
                d5: "{{ states('input_number.cdd_day_5')|float(0) }}"
                d6: "{{ states('input_number.cdd_day_6')|float(0) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_7
              data:
                value: "{{ d6 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_6
              data:
                value: "{{ d5 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_5
              data:
                value: "{{ d4 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_4
              data:
                value: "{{ d3 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_3
              data:
                value: "{{ d2 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_2
              data:
                value: "{{ d1 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_day_1
              data:
                value: "{{ todays_cdd }}"
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.cdd_capture_last_ok
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            - service: system_log.write
              data:
                message: "CDD sliding window captured: today={{ todays_cdd }}"
                level: info
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              CDD capture skipped - proxy_ok={{ proxy_ok }},
              CDD={{ todays_cdd }}

# ===============================================================
# RUNTIME PER HDD TRACKING - Daily capture at 11:56 PM (HARDENED)
# ===============================================================
- id: capture_daily_runtime_per_hdd
  alias: "Capture Daily Runtime per HDD"
  description: "Records daily runtime/HDD for 7-day std dev calculation"
  mode: single
  trigger:
    - platform: time
      at: "23:56:00"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {% set runtime_hdd = states('sensor.hvac_total_runtime_per_hdd_today') %}
                {% set furnace_runtime = states('sensor.hvac_furnace_runtime_today') %}
                {% set hdd_today = states('sensor.hvac_hdd65_today') %}
                {% set val = runtime_hdd | float(-1) %}
                {# Upstream validation: dependencies must be available #}
                {% set upstream_ok = furnace_runtime not in ['unknown', 'unavailable'] and
                                     hdd_today not in ['unknown', 'unavailable'] %}
                {# Value validation: runtime/HDD must be valid number in range #}
                {% set values_ok = is_number(runtime_hdd) and 0 <= val <= 120 %}
                {{ upstream_ok and values_ok }}
          sequence:
            - variables:
                todays_runtime_per_hdd: "{{ states('sensor.hvac_total_runtime_per_hdd_today')|float }}"
                d1: "{{ states('input_number.runtime_per_hdd_day_1')|float(0) }}"
                d2: "{{ states('input_number.runtime_per_hdd_day_2')|float(0) }}"
                d3: "{{ states('input_number.runtime_per_hdd_day_3')|float(0) }}"
                d4: "{{ states('input_number.runtime_per_hdd_day_4')|float(0) }}"
                d5: "{{ states('input_number.runtime_per_hdd_day_5')|float(0) }}"
                d6: "{{ states('input_number.runtime_per_hdd_day_6')|float(0) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_7
              data:
                value: "{{ d6 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_6
              data:
                value: "{{ d5 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_5
              data:
                value: "{{ d4 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_4
              data:
                value: "{{ d3 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_3
              data:
                value: "{{ d2 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_2
              data:
                value: "{{ d1 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_hdd_day_1
              data:
                value: "{{ todays_runtime_per_hdd }}"
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.runtime_per_hdd_capture_last_ok
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      default:
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.runtime_per_hdd_capture_last_ok
          data:
            datetime: "1970-01-01 00:00:00"
        - service: system_log.write
          data:
            level: warning
            message: >
              Runtime/HDD capture skipped - Furnace_runtime={{ states('sensor.hvac_furnace_runtime_today') }},
              HDD_today={{ states('sensor.hvac_hdd65_today') }},
              Runtime_per_HDD={{ states('sensor.hvac_total_runtime_per_hdd_today') }}

# ===============================================================
