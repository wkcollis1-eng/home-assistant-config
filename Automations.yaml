# ===============================================================
# MONTHLY REPORT TRACKING - Daily capture at 11:56:30 PM
# ===============================================================
- id: capture_daily_monthly_tracking
  alias: "Capture Daily Monthly Tracking"
  description: "Accumulates HDD/CDD, outdoor temp, expected runtime, and furnace/zone metrics for monthly report"
  mode: single
  trigger:
    - platform: time
      at: "23:56:30"
  action:
    # Snapshot ALL daily values before any updates (atomic capture)
    - variables:
        todays_high: "{{ states('input_number.outdoor_temp_daily_high') | float(0) }}"
        todays_low: "{{ states('input_number.outdoor_temp_daily_low') | float(0) }}"
        todays_mean: "{{ ((todays_high + todays_low) / 2) | round(1) }}"
        todays_expected: "{{ states('sensor.expected_runtime_today') | float(0) }}"
        current_temp_sum: "{{ states('input_number.outdoor_temp_sum_month') | float(0) }}"
        current_days: "{{ states('input_number.outdoor_temp_days_month') | int(0) }}"
        current_expected_sum: "{{ states('input_number.expected_runtime_sum_month') | float(0) }}"
        # HDD/CDD daily values (moved from capture_daily_hdd to unify timing)
        todays_hdd: "{{ states('sensor.hvac_hdd65_today') | float(0) }}"
        todays_cdd: "{{ states('sensor.hvac_cdd65_today') | float(0) }}"
        hdd_month_acc: "{{ states('input_number.hdd_cumulative_month_auto') | float(0) }}"
        hdd_year_acc: "{{ states('input_number.hdd_cumulative_year_auto') | float(0) }}"
        cdd_month_acc: "{{ states('input_number.cdd_cumulative_month_auto') | float(0) }}"
        cdd_year_acc: "{{ states('input_number.cdd_cumulative_year_auto') | float(0) }}"
        # Furnace/zone daily values (from history_stats "today" sensors)
        furnace_runtime_today: "{{ states('sensor.hvac_furnace_runtime_today') | float(0) }}"
        furnace_cycles_today: "{{ states('sensor.hvac_furnace_cycles_today') | int(0) }}"
        zone_1f_runtime_today: "{{ states('sensor.hvac_1f_heat_runtime_today') | float(0) }}"
        zone_2f_runtime_today: "{{ states('sensor.hvac_2f_heat_runtime_today') | float(0) }}"
        zone_1f_cycles_today: "{{ states('sensor.hvac_1f_heat_cycles_today') | int(0) }}"
        zone_2f_cycles_today: "{{ states('sensor.hvac_2f_heat_cycles_today') | int(0) }}"
        # Current accumulators
        furnace_runtime_acc: "{{ states('input_number.furnace_runtime_month_acc') | float(0) }}"
        furnace_cycles_acc: "{{ states('input_number.furnace_cycles_month_acc') | int(0) }}"
        zone_1f_runtime_acc: "{{ states('input_number.zone_1f_runtime_month_acc') | float(0) }}"
        zone_2f_runtime_acc: "{{ states('input_number.zone_2f_runtime_month_acc') | float(0) }}"
        zone_1f_cycles_acc: "{{ states('input_number.zone_1f_cycles_month_acc') | int(0) }}"
        zone_2f_cycles_acc: "{{ states('input_number.zone_2f_cycles_month_acc') | int(0) }}"
        # AC cooling daily values
        ac_runtime_today: "{{ states('sensor.hvac_ac_runtime_today') | float(0) }}"
        ac_cycles_today: "{{ states('sensor.hvac_ac_cycles_today') | int(0) }}"
        zone_1f_cool_runtime_today: "{{ states('sensor.hvac_1f_cool_runtime_today') | float(0) }}"
        zone_2f_cool_runtime_today: "{{ states('sensor.hvac_2f_cool_runtime_today') | float(0) }}"
        zone_1f_cool_cycles_today: "{{ states('sensor.hvac_1f_cool_cycles_today') | int(0) }}"
        zone_2f_cool_cycles_today: "{{ states('sensor.hvac_2f_cool_cycles_today') | int(0) }}"
        # AC cooling accumulators
        ac_runtime_acc: "{{ states('input_number.ac_runtime_month_acc') | float(0) }}"
        ac_cycles_acc: "{{ states('input_number.ac_cycles_month_acc') | int(0) }}"
        zone_1f_cool_runtime_acc: "{{ states('input_number.zone_1f_cool_runtime_month_acc') | float(0) }}"
        zone_2f_cool_runtime_acc: "{{ states('input_number.zone_2f_cool_runtime_month_acc') | float(0) }}"
        zone_1f_cool_cycles_acc: "{{ states('input_number.zone_1f_cool_cycles_month_acc') | int(0) }}"
        zone_2f_cool_cycles_acc: "{{ states('input_number.zone_2f_cool_cycles_month_acc') | int(0) }}"
        # AC cooling yearly accumulators
        ac_runtime_year_acc: "{{ states('input_number.ac_runtime_year_acc') | float(0) }}"
        ac_cycles_year_acc: "{{ states('input_number.ac_cycles_year_acc') | int(0) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ todays_high > -49 and todays_low < 149 and
                   is_number(todays_hdd) and is_number(todays_cdd) and
                   0 <= todays_hdd <= 65 and 0 <= todays_cdd <= 50 }}
          sequence:
            # ── TIMESTAMP FIRST ──────────────────────────────────────────
            # Set before ANY accumulator updates so captured_today flips
            # atomically for all month sensors (HDD + runtime + cycles).
            # Brief dip (accumulators missing today) affects numerator and
            # denominator equally, keeping the efficiency ratio stable.
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.monthly_tracking_capture_last_ok
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            # ── HDD/CDD accumulators (moved from capture_daily_hdd) ─────
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_cumulative_month_auto
              data:
                value: "{{ (hdd_month_acc + todays_hdd) | round(1) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_cumulative_month_auto
              data:
                value: "{{ (cdd_month_acc + todays_cdd) | round(1) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.hdd_cumulative_year_auto
              data:
                value: "{{ (hdd_year_acc + todays_hdd) | round(1) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.cdd_cumulative_year_auto
              data:
                value: "{{ (cdd_year_acc + todays_cdd) | round(1) }}"
            # ── Outdoor temp tracking ────────────────────────────────────
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_sum_month
              data:
                value: "{{ current_temp_sum + todays_mean }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.outdoor_temp_days_month
              data:
                value: "{{ current_days + 1 }}"
            # ── Furnace/zone accumulators (immune to recorder purge) ─────
            - service: input_number.set_value
              target:
                entity_id: input_number.furnace_runtime_month_acc
              data:
                value: "{{ (furnace_runtime_acc + furnace_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.furnace_cycles_month_acc
              data:
                value: "{{ furnace_cycles_acc + furnace_cycles_today }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_1f_runtime_month_acc
              data:
                value: "{{ (zone_1f_runtime_acc + zone_1f_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_2f_runtime_month_acc
              data:
                value: "{{ (zone_2f_runtime_acc + zone_2f_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_1f_cycles_month_acc
              data:
                value: "{{ zone_1f_cycles_acc + zone_1f_cycles_today }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_2f_cycles_month_acc
              data:
                value: "{{ zone_2f_cycles_acc + zone_2f_cycles_today }}"
            # ── AC cooling accumulators ──────────────────────────────────
            - service: input_number.set_value
              target:
                entity_id: input_number.ac_runtime_month_acc
              data:
                value: "{{ (ac_runtime_acc + ac_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.ac_cycles_month_acc
              data:
                value: "{{ ac_cycles_acc + ac_cycles_today }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_1f_cool_runtime_month_acc
              data:
                value: "{{ (zone_1f_cool_runtime_acc + zone_1f_cool_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_2f_cool_runtime_month_acc
              data:
                value: "{{ (zone_2f_cool_runtime_acc + zone_2f_cool_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_1f_cool_cycles_month_acc
              data:
                value: "{{ zone_1f_cool_cycles_acc + zone_1f_cool_cycles_today }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.zone_2f_cool_cycles_month_acc
              data:
                value: "{{ zone_2f_cool_cycles_acc + zone_2f_cool_cycles_today }}"
            # ── AC cooling yearly accumulators ───────────────────────────
            - service: input_number.set_value
              target:
                entity_id: input_number.ac_runtime_year_acc
              data:
                value: "{{ (ac_runtime_year_acc + ac_runtime_today) | round(2) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.ac_cycles_year_acc
              data:
                value: "{{ ac_cycles_year_acc + ac_cycles_today }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.expected_runtime_sum_month
              data:
                value: "{{ current_expected_sum + todays_expected }}"
            - service: system_log.write
              data:
                message: >
                  Monthly tracking captured: HDD={{ todays_hdd }}, CDD={{ todays_cdd }},
                  mean={{ todays_mean }}°F, furnace={{ furnace_runtime_today }}h,
                  expected={{ todays_expected }}h, AC={{ ac_runtime_today }}h
                level: info
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              Monthly tracking SKIPPED - invalid temp or degree-day data.
              high={{ todays_high }}, low={{ todays_low }},
              HDD={{ todays_hdd }}, CDD={{ todays_cdd }}.
              Accumulators NOT updated. Check outdoor proxy sensor.

# RUNTIME PER CDD TRACKING - Daily capture at 11:56:45 PM
# ===============================================================
- id: capture_daily_runtime_per_cdd
  alias: "Capture Daily Runtime per CDD"
  description: "Shifts 7-day runtime/CDD sliding window for cooling efficiency tracking"
  mode: single
  trigger:
    - platform: time
      at: "23:56:45"
  action:
    - variables:
        ac_runtime: "{{ states('sensor.hvac_ac_runtime_today') }}"
        todays_cdd: "{{ states('sensor.hvac_cdd65_today') | float(0) }}"
        upstream_ok: "{{ ac_runtime not in ['unknown', 'unavailable'] and
                         todays_cdd > 0 }}"
        todays_ratio: >
          {% if upstream_ok %}
            {% set rt_min = ac_runtime | float(0) * 60 %}
            {{ (rt_min / todays_cdd) | round(1) }}
          {% else %}
            -1
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ upstream_ok and todays_ratio >= 0 }}"
          sequence:
            - variables:
                d1: "{{ states('input_number.runtime_per_cdd_day_1')|float(0) }}"
                d2: "{{ states('input_number.runtime_per_cdd_day_2')|float(0) }}"
                d3: "{{ states('input_number.runtime_per_cdd_day_3')|float(0) }}"
                d4: "{{ states('input_number.runtime_per_cdd_day_4')|float(0) }}"
                d5: "{{ states('input_number.runtime_per_cdd_day_5')|float(0) }}"
                d6: "{{ states('input_number.runtime_per_cdd_day_6')|float(0) }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_7
              data:
                value: "{{ d6 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_6
              data:
                value: "{{ d5 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_5
              data:
                value: "{{ d4 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_4
              data:
                value: "{{ d3 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_3
              data:
                value: "{{ d2 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_2
              data:
                value: "{{ d1 }}"
            - service: input_number.set_value
              target:
                entity_id: input_number.runtime_per_cdd_day_1
              data:
                value: "{{ todays_ratio }}"
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.runtime_per_cdd_capture_last_ok
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            - service: system_log.write
              data:
                message: "Runtime/CDD sliding window captured: ratio={{ todays_ratio }} min/CDD"
                level: info
      default:
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.runtime_per_cdd_capture_last_ok
          data:
            datetime: "1970-01-01 00:00:00"
        - service: system_log.write
          data:
            level: warning
            message: >
              Runtime/CDD capture skipped - AC_runtime={{ ac_runtime }},
              CDD={{ todays_cdd }}

# ===============================================================
# MONTHLY/YEARLY RESETS - With startup catch-up
# ===============================================================
- id: reset_monthly_hdd
  alias: "Reset Monthly HDD/CDD"
  description: "Resets month counters on day 1, with startup catch-up if HA was down"
  mode: single
  trigger:
    - platform: time
      at: "00:01:00"
      id: scheduled
    - platform: homeassistant
      event: start
      id: startup
  condition:
    - condition: template
      value_template: >
        {% set last_ok = states('input_datetime.hdd_capture_last_ok') %}
        {% set month_val = states('input_number.hdd_cumulative_month_auto')|float(0) %}
        {% if now().day != 1 %}
          false
        {% elif month_val == 0 %}
          {# Already reset, don't reset again #}
          false
        {% elif now().hour < 3 %}
          {# Normal window: always reset #}
          true
        {% elif last_ok not in ['unknown', 'unavailable', '1970-01-01 00:00:00'] %}
          {# Late startup: only reset if last capture was previous month #}
          {% set last_capture = last_ok | as_datetime | as_local %}
          {{ last_capture.month != now().month }}
        {% else %}
          false
        {% endif %}
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.hdd_cumulative_month_auto
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.cdd_cumulative_month_auto
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.outdoor_temp_sum_month
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.outdoor_temp_days_month
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.expected_runtime_sum_month
      data:
        value: 0
    # Reset furnace/zone monthly accumulators
    - service: input_number.set_value
      target:
        entity_id: input_number.furnace_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.furnace_cycles_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_1f_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_2f_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_1f_cycles_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_2f_cycles_month_acc
      data:
        value: 0
    # Reset AC cooling monthly accumulators
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_cycles_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_1f_cool_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_2f_cool_runtime_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_1f_cool_cycles_month_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.zone_2f_cool_cycles_month_acc
      data:
        value: 0
    # Archive closing month's MPC stats before reset
    # Month index used to select the right archive slot
    - variables:
        closing_month: "{{ (now() - timedelta(days=1)).strftime('%b') | lower }}"
    - service: input_number.set_value
      target:
        entity_id: >
          input_number.furnace_mpc_archive_{{ closing_month }}
      data:
        value: >
          {{ states('sensor.hvac_furnace_cycle_mean_7d') | float(0) }}
    - service: input_number.set_value
      target:
        entity_id: >
          input_number.furnace_mpc_sigma_archive_{{ closing_month }}
      data:
        value: >
          {{ states('sensor.hvac_furnace_cycle_sigma_7d') | float(0) }}
    - service: input_number.set_value
      target:
        entity_id: >
          input_number.furnace_short_cycle_archive_{{ closing_month }}
      data:
        value: >
          {{ states('sensor.hvac_furnace_short_cycle_pct_7d') | float(0) }}
    - service: system_log.write
      data:
        message: "Monthly HDD/CDD, furnace, and AC cooling accumulators reset completed (trigger: {{ trigger.id }})"
        level: info

- id: reset_yearly_hdd
  alias: "Reset Yearly HDD/CDD"
  description: "Resets year counters on Jan 1, with startup catch-up if HA was down"
  mode: single
  trigger:
    - platform: time
      at: "00:02:00"
      id: scheduled
    - platform: homeassistant
      event: start
      id: startup
  condition:
    - condition: template
      value_template: >
        {% set last_ok = states('input_datetime.hdd_capture_last_ok') %}
        {% set year_val = states('input_number.hdd_cumulative_year_auto')|float(0) %}
        {% if not (now().month == 1 and now().day == 1) %}
          false
        {% elif year_val == 0 %}
          {# Already reset, don't reset again #}
          false
        {% elif now().hour < 3 %}
          {# Normal window: always reset #}
          true
        {% elif last_ok not in ['unknown', 'unavailable', '1970-01-01 00:00:00'] %}
          {# Late startup: only reset if last capture was previous year #}
          {% set last_capture = last_ok | as_datetime | as_local %}
          {{ last_capture.year != now().year }}
        {% else %}
          false
        {% endif %}
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.hdd_cumulative_year_auto
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.cdd_cumulative_year_auto
      data:
        value: 0
    # Reset AC cooling yearly accumulators
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_runtime_year_acc
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_cycles_year_acc
      data:
        value: 0
    - service: system_log.write
      data:
        message: "Yearly HDD/CDD reset completed (trigger: {{ trigger.id }})"
        level: info

# ===============================================================
# MONTHLY HDD ARCHIVE (for rolling 12-month efficiency calculations)
# ===============================================================
- id: archive_monthly_hdd
  alias: "Archive Monthly HDD"
  description: "Archives month's total HDD to rolling 12-month archive on last day of month"
  mode: single
  trigger:
    - platform: time
      at: "23:58:15"
  condition:
    # Only run on last day of month
    - condition: template
      value_template: >
        {% set tomorrow = now() + timedelta(days=1) %}
        {{ tomorrow.day == 1 }}
  action:
    - variables:
        # Note: hdd_cumulative_month_auto already includes today's HDD (added at 23:56:30)
        month_hdd: "{{ states('input_number.hdd_cumulative_month_auto') | float(0) }}"
        month_name: >
          {% set months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'] %}
          {{ months[now().month - 1] }}
    - service: input_number.set_value
      target:
        entity_id: "input_number.hdd_archive_{{ month_name }}"
      data:
        value: "{{ month_hdd | round(1) }}"
    - service: system_log.write
      data:
        message: "Monthly HDD archived: {{ month_name | upper }} = {{ month_hdd | round(1) }} HDD"
        level: info

# ===============================================================
# MONTHLY CDD ARCHIVE (mirrors HDD archive for cooling season analysis)
# ===============================================================
- id: archive_monthly_cdd
  alias: "Archive Monthly CDD"
  description: "Archives month's total CDD to rolling 12-month archive on last day of month"
