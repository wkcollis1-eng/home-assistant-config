  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {% set min_per_cycle = states('sensor.hvac_furnace_min_per_cycle') %}
                {% set furnace_cycles = states('sensor.hvac_furnace_cycles_today') %}
                {% set furnace_runtime = states('sensor.hvac_furnace_runtime_today') %}
                {% set val = min_per_cycle | float(-1) %}
                {# Upstream validation: need at least 2 cycles for meaningful average #}
                {% set cycles_ok = furnace_cycles | int(0) >= 2 %}
                {# Value validation: min/cycle must be in valid range #}
                {% set values_ok = is_number(min_per_cycle) and 0 < val <= 60 %}
                {{ cycles_ok and values_ok }}
