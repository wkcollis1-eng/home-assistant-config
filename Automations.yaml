# ===============================================================
# DEHUMIDIFIER AUTOMATIONS
# ===============================================================
- id: dehumidifier_auto_on
  alias: "Dehumidifier Auto On"
  description: "Turn on dehumidifier when dew point exceeds threshold"
  trigger:
    - platform: state
      entity_id: binary_sensor.dehumidifier_should_run
      to: "on"
  condition:
    - condition: state
      entity_id: switch.dehumidifier
      state: "off"
    - condition: template
      value_template: >
        {% set last_off = state_attr('automation.dehumidifier_auto_off', 'last_triggered') %}
        {{ last_off is none or (now() - last_off).total_seconds() > 1800 }}
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.dehumidifier

- id: dehumidifier_auto_off
  alias: "Dehumidifier Auto Off"
  description: "Turn off dehumidifier after 4 hours or when conditions clear"
  trigger:
    # REPLACED: old binary_sensor state trigger with template using -1°F hysteresis
    - platform: template
      id: conditions_cleared
      value_template: >
        {% set setpoint = states('input_number.dehumidifier_dewpoint_threshold') | float(45) %}
        {% set current_dp = states('sensor.basement_dew_point') | float %}
        {{ current_dp < (setpoint - 1) }}
    - platform: state
      entity_id: switch.dehumidifier
      to: "on"
      for:
        minutes: 150
      id: max_runtime
  condition:
    - condition: state
      entity_id: switch.dehumidifier
      state: "on"
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.dehumidifier_last_stop_reason
      data:
        option: "{{ trigger.id }}"
    - service: switch.turn_off
      target:
        entity_id: switch.dehumidifier

# ===============================================================
# DEHUMIDIFIER PERFORMANCE TRACKING (Santa Fe Classic Tuned)
# Triggers on compressor_active (power-gated), not switch state.
# Control automations (auto_on / auto_off) are unchanged above.
# ===============================================================
- id: dehumidifier_cycle_start_capture
  alias: "Dehumidifier Cycle Start Capture"
  description: "Capture dew point and timestamp when compressor turns on"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.dehumidifier_compressor_active
      from: "off"
      to: "on"
  condition:
    - condition: template
      value_template: >
        {% set dp = states('sensor.basement_dew_point') %}
        {% set dp_val = dp | float(-999) %}
        {{ dp not in ['unknown', 'unavailable'] and dp_val >= 20 and dp_val <= 90 }}
  action:
    - service: counter.increment
      target:
        entity_id: counter.dehumidifier_cycles_today
    - service: input_number.set_value
      target:
        entity_id: input_number.dehumidifier_cycle_start_dp
      data:
        value: "{{ states('sensor.basement_dew_point') | float(0) | round(1) }}"
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.dehumidifier_cycle_start_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    # Calculate hold time from last cycle end (only if last stop was conditions_cleared)
    - if:
        - condition: template
          value_template: >
            {% set last_end = states('input_datetime.dehumidifier_last_cycle_end_time') %}
            {% set reason = states('input_select.dehumidifier_last_stop_reason') %}
            {{ last_end not in ['unknown', 'unavailable'] and
               last_end[:4] != '1970' and
               reason == 'conditions_cleared' }}
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.dehumidifier_last_hold_hours
          data:
            value: >
              {% set last_end = states('input_datetime.dehumidifier_last_cycle_end_time') %}
              {% set end_ts = as_timestamp(last_end, 0) %}
              {% set hold_h = (as_timestamp(now()) - end_ts) / 3600 %}
              {{ [[hold_h | round(1), 0] | max, 72] | min }}

- id: dehumidifier_cycle_end_capture
  alias: "Dehumidifier Cycle End Capture"
  description: "Calculate pull-down rate and cycle duration when compressor turns off"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.dehumidifier_compressor_active
      from: "on"
      to: "off"
  condition:
    - condition: template
      value_template: >
        {% set dp = states('sensor.basement_dew_point') %}
        {% set start_time = states('input_datetime.dehumidifier_cycle_start_time') %}
        {{ dp not in ['unknown', 'unavailable'] and
           start_time not in ['unknown', 'unavailable'] and
           start_time[:4] != '1970' }}
  action:
    - variables:
        cycle_minutes: >
          {% set start_ts = as_timestamp(states('input_datetime.dehumidifier_cycle_start_time'), 0) %}
          {{ ((as_timestamp(now()) - start_ts) / 60) | round(1) }}
        start_dp: "{{ states('input_number.dehumidifier_cycle_start_dp') | float(0) }}"
        current_dp: "{{ states('sensor.basement_dew_point') | float(0) }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.dehumidifier_last_cycle_minutes
      data:
        value: "{{ [[cycle_minutes | float, 0] | max, 300] | min }}"
    # Only calculate pull-down rate for cycles >= 10 minutes (short cycle guard)
    - if:
        - condition: template
          value_template: "{{ cycle_minutes | float >= 10 }}"
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.dehumidifier_last_pull_down_rate
          data:
            value: >
              {% set delta_dp = start_dp | float - current_dp | float %}
              {% set hours = cycle_minutes | float / 60 %}
              {% set rate = delta_dp / hours if hours > 0 else 0 %}
              {{ [[rate | round(1), -10] | max, 20] | min }}
      else:
        - service: input_number.set_value
          target:
            entity_id: input_number.dehumidifier_last_pull_down_rate
          data:
            value: 0
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.dehumidifier_last_cycle_end_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

- id: dehumidifier_cycle_counter_reset
  alias: "Dehumidifier Cycle Counter Reset"
  description: "Reset daily cycle counter at midnight"
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - service: counter.reset
      target:
        entity_id: counter.dehumidifier_cycles_today

# ===============================================================
# DEHUMIDIFIER STALL DETECTION (RH-based, tuned from 2026 data)
# ---------------------------------------------------------------
# Fires every 30 min while compressor is active and runtime > 90 min.
# Stops the unit early when RH has improved < 0.3 %/hr over the
# prior 60 min — the measured stall signature (5 of 8 cycles stall
# at hr 3-4).  Uses RH directly (6-min median updates, 7.5× better
# SNR than DP at 0.051°F/step).
#
# Threshold 0.3 %/hr = 3 steps of 0.1% RH in 60 min.
# sensor.dehumidifier_rh_mean_60min: statistics platform, max_age 60 min.
# sensor.dehumidifier_rh_drop_rate_60min = mean_60min − current_rh.
#
# SEASONAL NOTE: In July–Aug the unit pulls hard all cycle; this
# automation will not fire (drop rate stays > 0.3%/hr). In June and
# September it captures the stall pattern observed in the data.
# ===============================================================
- id: dehumidifier_rh_stall_shutdown
  alias: "Dehumidifier RH Stall Shutdown"
  description: "Stop dehumidifier early when RH improvement has stalled for 60 min"
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition:
    # Compressor must be actively running
    - condition: state
      entity_id: binary_sensor.dehumidifier_compressor_active
      state: "on"
    # Must have been running > 90 min (skip compressor warmup and early-cycle noise)
    - condition: template
      value_template: >
        {{ (now() - states.binary_sensor.dehumidifier_compressor_active.last_changed).total_seconds() > 5400 }}
    # RH drop rate must be below stall threshold (< 0.3 %/hr)
    # Two consecutive checks are needed; this is the check — mode: single
    # prevents re-entry so a single stall reading won't double-fire.
    - condition: template
      value_template: >
        {% set drop_rate = states('sensor.dehumidifier_rh_drop_rate_60min') | float(-99) %}
        {{ drop_rate != -99 and drop_rate < 0.3 }}
    # Stall stats sensor must have enough data (>= 5 readings)
    - condition: template
      value_template: >
        {{ states('sensor.dehumidifier_rh_mean_60min') not in ['unknown', 'unavailable'] }}
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.dehumidifier_last_stop_reason
      data:
        option: "rh_stall"
    - service: switch.turn_off
      target:
        entity_id: switch.dehumidifier
    - service: system_log.write
      data:
        level: info
        message: >
          Dehumidifier stall shutdown: RH drop rate {{ states('sensor.dehumidifier_rh_drop_rate_60min') | float(0) | round(2) }} %/hr
          (threshold 0.3 %/hr, runtime {{ ((now() - states.binary_sensor.dehumidifier_compressor_active.last_changed).total_seconds() / 60) | round(0) | int }} min).
          RH {{ states('sensor.shelly_temperature_humidity_humidity') }}%,
          60-min mean {{ states('sensor.dehumidifier_rh_mean_60min') }}%.

# ===============================================================
# FILTER TRACKING AUTOMATIONS (HARDENED)
# ===============================================================
- id: accumulate_filter_runtime
  alias: "Accumulate Filter Runtime"
  description: "Add daily runtime to filter hours at end of day"
  mode: single
  trigger:
    - platform: time
      at: "23:58:00"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ (is_number(states('sensor.hvac_total_heat_runtime_today')) and
                    states('sensor.hvac_total_heat_runtime_today')|float >= 0) or
                   (is_number(states('sensor.hvac_ac_runtime_today')) and
                    states('sensor.hvac_ac_runtime_today')|float >= 0) }}
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.hvac_filter_runtime_hours
              data:
                value: >
                  {{ (states('input_number.hvac_filter_runtime_hours')|float(0) +
                      states('sensor.hvac_total_heat_runtime_today')|float(0) +
                      states('sensor.hvac_ac_runtime_today')|float(0))|round(2) }}
      default:
        - service: system_log.write
          data:
            message: "Filter runtime capture skipped - sensor unavailable: {{ states('sensor.hvac_total_heat_runtime_today') }}"
            level: warning

- id: reset_filter_runtime_button
  alias: "Reset Filter Runtime"
  description: "Reset filter runtime when button pressed"
  trigger:
    - platform: state
      entity_id: input_button.reset_filter_runtime
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_filter_runtime_hours
      data:
        value: 0
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_filter_last_changed
      data:
        date: "{{ now().strftime('%Y-%m-%d') }}"
    - service: persistent_notification.create
      data:
        title: "Filter Reset"
        message: "Filter runtime reset to 0 hours. Change date recorded."

- id: notify_filter_change_due
  alias: "Notify Filter Change Due"
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_filter_change_alert
      to: "on"
  action:
    - service: persistent_notification.create
      data:
        title: "HVAC Filter Change Due"
        message: "Filter has {{ states('input_number.hvac_filter_runtime_hours') | round(0) }} runtime hours. Time to replace!"

# ===============================================================
# SETBACK & RECOVERY TRACKING
# Simple state machine: IDLE → SETBACK_ACTIVE → RECOVERING → IDLE
# Self-correcting: template triggers survive restarts, timeouts clear stuck state
# ===============================================================

# --- SETBACK START (1F) ---
- id: hvac_1f_setback_start
  alias: "1F Setback Start"
  mode: single
  trigger:
    - platform: state
      entity_id: climate.main_floor
      attribute: temperature
      for:
        seconds: 5
  condition:
    - condition: template
      value_template: >
        {% set from_t = trigger.from_state.attributes.temperature | float(-999) %}
        {% set to_t = trigger.to_state.attributes.temperature | float(-999) %}
        {{ from_t > 50 and to_t > 50 and (from_t - to_t) >= 1 }}
    - condition: state
      entity_id: input_boolean.hvac_1f_setback_active
      state: "off"
    - condition: template
      value_template: "{{ now().hour >= 18 }}"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.hvac_1f_setback_active
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_recovering
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_1f_setback_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_1f_hold_setpoint
      data:
        value: "{{ trigger.from_state.attributes.temperature | float(67) }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_1f_setback_setpoint
      data:
        value: "{{ trigger.to_state.attributes.temperature | float(62) }}"

# --- SETBACK START (2F) ---
- id: hvac_2f_setback_start
  alias: "2F Setback Start"
  mode: single
  trigger:
    - platform: state
      entity_id: climate.upstairs
      attribute: temperature
      for:
        seconds: 5
  condition:
    - condition: template
      value_template: >
        {% set from_t = trigger.from_state.attributes.temperature | float(-999) %}
        {% set to_t = trigger.to_state.attributes.temperature | float(-999) %}
        {{ from_t > 50 and to_t > 50 and (from_t - to_t) >= 1 }}
    - condition: state
      entity_id: input_boolean.hvac_2f_setback_active
      state: "off"
    - condition: template
      value_template: "{{ now().hour >= 18 }}"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.hvac_2f_setback_active
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_recovering
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_2f_setback_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_2f_hold_setpoint
      data:
        value: "{{ trigger.from_state.attributes.temperature | float(67) }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_2f_setback_setpoint
      data:
        value: "{{ trigger.to_state.attributes.temperature | float(62) }}"

# --- SETBACK LOWERED (captures mid-cycle drops, e.g. utility DR events) ---
- id: hvac_1f_setback_lowered
  alias: "1F Setback Lowered"
  mode: single
  trigger:
    - platform: state
      entity_id: climate.main_floor
      attribute: temperature
      for:
        seconds: 5
  condition:
    - condition: state
      entity_id: input_boolean.hvac_1f_setback_active
      state: "on"
    - condition: template
      value_template: >
        {% set to_t = trigger.to_state.attributes.temperature | float(-999) %}
        {% set stored = states('input_number.hvac_1f_setback_setpoint') | float(999) %}
        {{ to_t > 50 and to_t < stored }}
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_1f_setback_setpoint
      data:
        value: "{{ trigger.to_state.attributes.temperature | float(62) }}"

- id: hvac_2f_setback_lowered
  alias: "2F Setback Lowered"
  mode: single
  trigger:
    - platform: state
      entity_id: climate.upstairs
      attribute: temperature
      for:
        seconds: 5
  condition:
    - condition: state
      entity_id: input_boolean.hvac_2f_setback_active
      state: "on"
    - condition: template
      value_template: >
        {% set to_t = trigger.to_state.attributes.temperature | float(-999) %}
        {% set stored = states('input_number.hvac_2f_setback_setpoint') | float(999) %}
        {{ to_t > 50 and to_t < stored }}
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_2f_setback_setpoint
      data:
        value: "{{ trigger.to_state.attributes.temperature | float(62) }}"

# --- RECOVERY START (1F) ---
# Template trigger: fires when setpoint returns to comfort AND house is still cold.
# Re-evaluates at HA startup → self-healing after restarts.
- id: hvac_1f_recovery_start
  alias: "1F Recovery Start"
  mode: single
  trigger:
    - platform: template
      value_template: >
        {% set active = is_state('input_boolean.hvac_1f_setback_active', 'on') %}
        {% set not_rec = is_state('input_boolean.hvac_1f_recovering', 'off') %}
        {% set live = state_attr('climate.main_floor', 'temperature') | float(0) %}
        {% set hold = states('input_number.hvac_1f_hold_setpoint') | float(0) %}
        {% set current = states('sensor.main_floor_current_temperature') | float(0) %}
        {{ active and not_rec and hold > 50 and live >= (hold - 0.5) and current < (hold - 0.5) }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.hvac_1f_recovering
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_1f_recovery_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_1f_recovery_start_temp
      data:
        value: >
          {{ state_attr('climate.main_floor',
             'current_temperature') | float(65) }}

# --- RECOVERY START (2F) ---
- id: hvac_2f_recovery_start
  alias: "2F Recovery Start"
  mode: single
  trigger:
    - platform: template
      value_template: >
        {% set active = is_state('input_boolean.hvac_2f_setback_active', 'on') %}
        {% set not_rec = is_state('input_boolean.hvac_2f_recovering', 'off') %}
        {% set live = state_attr('climate.upstairs', 'temperature') | float(0) %}
        {% set hold = states('input_number.hvac_2f_hold_setpoint') | float(0) %}
        {% set current = states('sensor.upstairs_current_temperature') | float(0) %}
        {{ active and not_rec and hold > 50 and live >= (hold - 0.5) and current < (hold - 0.5) }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.hvac_2f_recovering
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_2f_recovery_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_2f_recovery_start_temp
      data:
        value: >
          {{ state_attr('climate.upstairs',
             'current_temperature') | float(65) }}

# --- RECOVERY END (1F) ---
# Template trigger with for: 5 min — current temp reaches comfort target.
# Also re-evaluates at HA startup → self-healing.
- id: hvac_1f_recovery_end
  alias: "1F Recovery End"
  mode: single
  trigger:
    - platform: template
      value_template: >
        {% set recovering = is_state('input_boolean.hvac_1f_recovering', 'on') %}
        {% set current = states('sensor.main_floor_current_temperature') | float(0) %}
        {% set target = states('input_number.hvac_1f_hold_setpoint') | float(0) %}
        {{ recovering and target > 50 and current >= (target - 1.0) }}
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: input_boolean.hvac_1f_setback_active
      state: "on"
    - condition: state
      entity_id: input_boolean.hvac_1f_recovering
      state: "on"
  action:
    - variables:
        recovery_minutes: >
          {% set start = states('input_datetime.hvac_1f_recovery_start') %}
          {% if start not in ['unknown', 'unavailable'] %}
            {{ ((now() - (start | as_datetime | as_local)).total_seconds() / 60) | round(1) }}
          {% else %}0{% endif %}
        degrees_to_recover: >
          {% set hold = states('input_number.hvac_1f_hold_setpoint') | float(0) %}
          {% set st = states('input_number.hvac_1f_recovery_start_temp') | float(0) %}
          {{ [(hold - st), 0.1] | max | round(1) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_1f_last_recovery_minutes
      data:
        value: "{{ [recovery_minutes | float, 300] | min }}"
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ recovery_minutes | float > 0 and
                   recovery_minutes | float <= 300 and
                   degrees_to_recover | float >= 0.5 }}
          sequence:
            - service: shell_command.appendsetbacklog_1f
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              Skipped 1F setback CSV: recovery_min={{ recovery_minutes }},
              deg_to_recover={{ degrees_to_recover }}
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_recovering
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_setback_active

# --- RECOVERY END (2F) ---
# 1.25°F threshold (cathedral ceiling asymptote)
- id: hvac_2f_recovery_end
  alias: "2F Recovery End"
  mode: single
  trigger:
    - platform: template
      value_template: >
        {% set recovering = is_state('input_boolean.hvac_2f_recovering', 'on') %}
        {% set current = states('sensor.upstairs_current_temperature') | float(0) %}
        {% set target = states('input_number.hvac_2f_hold_setpoint') | float(0) %}
        {{ recovering and target > 50 and current >= (target - 1.25) }}
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: input_boolean.hvac_2f_setback_active
      state: "on"
    - condition: state
      entity_id: input_boolean.hvac_2f_recovering
      state: "on"
  action:
    - variables:
        recovery_minutes: >
          {% set start = states('input_datetime.hvac_2f_recovery_start') %}
          {% if start not in ['unknown', 'unavailable'] %}
            {{ ((now() - (start | as_datetime | as_local)).total_seconds() / 60) | round(1) }}
          {% else %}0{% endif %}
        degrees_to_recover: >
          {% set hold = states('input_number.hvac_2f_hold_setpoint') | float(0) %}
          {% set st = states('input_number.hvac_2f_recovery_start_temp') | float(0) %}
          {{ [(hold - st), 0.1] | max | round(1) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.hvac_2f_last_recovery_minutes
      data:
        value: "{{ [recovery_minutes | float, 300] | min }}"
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ recovery_minutes | float > 0 and
                   recovery_minutes | float <= 300 and
                   degrees_to_recover | float >= 0.5 }}
          sequence:
            - service: shell_command.appendsetbacklog_2f
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              Skipped 2F setback CSV: recovery_min={{ recovery_minutes }},
              deg_to_recover={{ degrees_to_recover }}
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_recovering
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_setback_active

# ===============================================================
# SELF-CORRECTION: Stuck-state safety valves
# ===============================================================

# Setback active >14h without recovery starting → force clear
- id: hvac_1f_setback_stuck_clear
  alias: "1F Setback Stuck Clear"
  trigger:
    - platform: state
      entity_id: input_boolean.hvac_1f_setback_active
      to: "on"
      for:
        hours: 14
  condition:
    - condition: state
      entity_id: input_boolean.hvac_1f_recovering
      state: "off"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_setback_active
    - service: system_log.write
      data:
        level: warning
        message: "1F setback latch stuck 14h without recovery — force cleared"

- id: hvac_2f_setback_stuck_clear
  alias: "2F Setback Stuck Clear"
  trigger:
    - platform: state
      entity_id: input_boolean.hvac_2f_setback_active
      to: "on"
      for:
        hours: 14
  condition:
    - condition: state
      entity_id: input_boolean.hvac_2f_recovering
      state: "off"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_setback_active
    - service: system_log.write
      data:
        level: warning
        message: "2F setback latch stuck 14h without recovery — force cleared"

# Recovery active >4h → recovery failed to complete, force clear
- id: hvac_1f_recovery_stuck_clear
  alias: "1F Recovery Stuck Clear"
  trigger:
    - platform: state
      entity_id: input_boolean.hvac_1f_recovering
      to: "on"
      for:
        hours: 4
  action:
    - service: system_log.write
      data:
        level: warning
        message: >
          1F recovery stuck 4h — force cleared.
          start_temp={{ states('input_number.hvac_1f_recovery_start_temp') }},
          hold={{ states('input_number.hvac_1f_hold_setpoint') }},
          current={{ states('sensor.main_floor_current_temperature') }}
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_recovering
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_1f_setback_active

- id: hvac_2f_recovery_stuck_clear
  alias: "2F Recovery Stuck Clear"
  trigger:
    - platform: state
      entity_id: input_boolean.hvac_2f_recovering
      to: "on"
      for:
        hours: 4
  action:
    - service: system_log.write
      data:
        level: warning
        message: >
          2F recovery stuck 4h — force cleared.
          start_temp={{ states('input_number.hvac_2f_recovery_start_temp') }},
          hold={{ states('input_number.hvac_2f_hold_setpoint') }},
          current={{ states('sensor.upstairs_current_temperature') }}
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_recovering
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.hvac_2f_setback_active

# Midnight audit: clear any stale recovering latches at 1 AM
- id: hvac_setback_midnight_audit
  alias: "Setback Midnight Audit"
  trigger:
    - platform: time
      at: "01:00:00"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.hvac_1f_recovering
          state: "on"
        - condition: state
          entity_id: input_boolean.hvac_2f_recovering
          state: "on"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.hvac_1f_recovering
          - input_boolean.hvac_2f_recovering
          - input_boolean.hvac_1f_setback_active
          - input_boolean.hvac_2f_setback_active
    - service: system_log.write
      data:
        level: warning
        message: >
          Midnight audit: cleared recovering latches still active at 1 AM.
          1F_recovering={{ states('input_boolean.hvac_1f_recovering') }},
          2F_recovering={{ states('input_boolean.hvac_2f_recovering') }}

# ===============================================================
# EFFICIENCY ALERTS
# ===============================================================
- id: notify_runtime_per_hdd_high
  alias: "Notify Runtime per HDD High"
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_runtime_per_hdd_high_alert
      to: "on"
  action:
    - service: persistent_notification.create
      data:
        title: "HVAC Efficiency Warning"
        message: >
          Runtime per HDD is {{ states('sensor.hvac_runtime_per_hdd_7_day_2') }} min/HDD,
          which exceeds upper bound ({{ states('sensor.hvac_runtime_per_hdd_upper_bound') }} = mean + 2σ).
          Check for air leaks, filter condition, or thermostat issues.

- id: notify_runtime_per_hdd_low
  alias: "Notify Runtime per HDD Low"
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_runtime_per_hdd_low_alert
      to: "on"
  action:
    - service: persistent_notification.create
      data:
        title: "HVAC Efficiency Notice"
        message: >
          Runtime per HDD is {{ states('sensor.hvac_runtime_per_hdd_7_day_2') }} min/HDD,
          which is below lower bound ({{ states('sensor.hvac_runtime_per_hdd_lower_bound') }} = mean - 2σ).
          System running more efficiently than expected.

- id: notify_ac_short_cycling
  alias: "Notify AC Short Cycling"
  description: "Alert when AC compressor is short cycling (<8 min/cycle)"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_ac_short_cycling_alert
      to: "on"
      for:
        minutes: 15
  action:
    - service: persistent_notification.create
      data:
        title: "AC Short Cycling Alert"
        message: >
          AC compressor is short cycling: {{ states('sensor.hvac_ac_min_per_cycle') }} min/cycle
          (threshold: 8 min). Cycles today: {{ states('sensor.hvac_ac_cycles_today') }}.
          Check refrigerant charge, filter, and thermostat settings.
        notification_id: ac_short_cycling

- id: notify_runtime_per_cdd_high
  alias: "Notify Runtime per CDD High"
  description: "Alert when runtime/CDD 7-day ratio exceeds mean+2σ upper bound"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_runtime_per_cdd_high_alert
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "Runtime/CDD High Alert"
        message: >
          AC runtime/CDD ratio {{ states('sensor.hvac_runtime_per_cdd_7_day') }} min/CDD
          exceeds upper bound {{ states('sensor.hvac_runtime_per_cdd_upper_bound') }} (mean + 2σ).
          Possible causes: dirty filter, low refrigerant, high humidity load, or degraded equipment.
        notification_id: runtime_per_cdd_high

- id: notify_runtime_per_cdd_low
  alias: "Notify Runtime per CDD Low"
  description: "Alert when runtime/CDD 7-day ratio falls below mean-2σ lower bound"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.hvac_runtime_per_cdd_low_alert
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "Runtime/CDD Low Alert"
        message: >
          AC runtime/CDD ratio {{ states('sensor.hvac_runtime_per_cdd_7_day') }} min/CDD
          is below lower bound {{ states('sensor.hvac_runtime_per_cdd_lower_bound') }} (mean - 2σ).
          Possible causes: very low humidity, sensor fault, or unusually efficient conditions.
        notification_id: runtime_per_cdd_low

- id: notify_cdd_capture_stale
  alias: "Notify CDD Capture Stale"
  description: "Alert when CDD sliding window capture has not succeeded in 26+ hours"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.cdd_capture_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "CDD Capture Stale"
        message: >
          CDD capture has not succeeded in over 26 hours.
          Last OK: {{ states('input_datetime.cdd_capture_last_ok') }}.
          Check outdoor proxy sensor and capture_daily_cdd automation.
        notification_id: cdd_capture_stale

- id: notify_runtime_per_cdd_capture_stale
  alias: "Notify Runtime per CDD Capture Stale"
  description: "Alert when runtime/CDD sliding window capture has not succeeded in 26+ hours"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.runtime_per_cdd_capture_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "Runtime/CDD Capture Stale"
        message: >
          Runtime/CDD capture has not succeeded in over 26 hours.
          Last OK: {{ states('input_datetime.runtime_per_cdd_capture_last_ok') }}.
          Check AC runtime sensor and capture_daily_runtime_per_cdd automation.
        notification_id: runtime_per_cdd_capture_stale

# ===============================================================
# DATABASE MAINTENANCE
# ===============================================================
- id: database_maintenance_weekly
  alias: "Database Maintenance Weekly"
  description: "Purge old data and repack database every Sunday at 3 AM"
  trigger:
    - platform: time
      at: "03:00:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - service: recorder.purge
      data:
        keep_days: 14
        repack: true
    - service: system_log.write
      data:
        message: "Weekly database maintenance completed - purged and repacked"
        level: info

# ===============================================================
# CSV REPORT GENERATION
# ===============================================================
- id: csv_daily_report
  alias: "CSV Daily Report"
  description: "Append daily HVAC data to CSV at 23:57 (after HDD capture)"
  trigger:
    - platform: time
      at: "23:57:00"
  action:
    - variables:
        outdoor_high: "{{ states('input_number.outdoor_temp_daily_high') | float(-50) }}"
        outdoor_low: "{{ states('input_number.outdoor_temp_daily_low') | float(150) }}"
        hdd_today: "{{ states('sensor.hvac_hdd65_today') | float(-1) }}"
        runtime_today_min: "{{ (states('sensor.hvac_furnace_runtime_today') | float(-1)) * 60 }}"
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ outdoor_high > -49 and outdoor_low < 149 and
                   outdoor_high >= outdoor_low and
                   hdd_today >= 0 and hdd_today <= 65 and
                   runtime_today_min >= 0 and runtime_today_min <= 1440 }}
          sequence:
            - service: shell_command.appenddailycsv
            - service: system_log.write
              data:
                message: "Daily CSV report appended"
                level: info
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              Daily CSV append skipped due to invalid data:
              high={{ outdoor_high }}, low={{ outdoor_low }},
              hdd={{ hdd_today }}, runtime_min={{ runtime_today_min | round(1) }}

- id: csv_monthly_report
  alias: "CSV Monthly Report"
  description: "Append monthly HVAC data to CSV on last day of month at 23:58:45"
  trigger:
    - platform: time
      at: "23:58:45"
  condition:
    - condition: template
      value_template: "{{ (now() + timedelta(days=1)).day == 1 }}"
  action:
    - variables:
        days_count: "{{ states('input_number.outdoor_temp_days_month') | int(0) }}"
        total_hdd: "{{ states('input_number.hdd_cumulative_month_auto') | float(-1) }}"
        runtime_hours: "{{ states('sensor.hvac_furnace_runtime_month_2') | float(-1) }}"
        runtime_per_hdd: "{{ states('sensor.hvac_runtime_per_hdd_month') | float(-1) }}"
        last_tracking_ok: "{{ states('input_datetime.monthly_tracking_capture_last_ok') }}"
        captured_today: >
          {% set dt = states('input_datetime.monthly_tracking_capture_last_ok') %}
          {{ dt not in ['unknown', 'unavailable', '1970-01-01 00:00:00'] and
             dt[:10] == now().strftime('%Y-%m-%d') }}
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ captured_today and
                   days_count >= 20 and
                   total_hdd >= 0 and total_hdd <= 2500 and
                   runtime_hours >= 0 and runtime_hours <= 2000 and
                   runtime_per_hdd >= 0 and runtime_per_hdd <= 120 }}
          sequence:
            - service: shell_command.appendmonthlycsv
            - service: system_log.write
              data:
                message: "Monthly CSV report appended"
                level: info
      default:
        - service: system_log.write
          data:
            level: warning
            message: >
              Monthly CSV append skipped due to invalid/incomplete data:
              captured_today={{ captured_today }}, days={{ days_count }},
              hdd={{ total_hdd }}, runtime_hours={{ runtime_hours }},
              runtime_per_hdd={{ runtime_per_hdd }}

- id: csv_yearly_rotation
  alias: "CSV Yearly Rotation"
  description: "Create new daily CSV file on Jan 1st"
  trigger:
    - platform: time
      at: "00:03:00"
  condition:
    - condition: template
      value_template: "{{ now().month == 1 and now().day == 1 }}"
  action:
    - service: shell_command.rotatedailycsv
    - service: system_log.write
      data:
        message: "Daily CSV rotated for new year"
        level: info

# ===============================================================
# WATCHDOG & ROBUSTNESS AUTOMATIONS
# ===============================================================

# WATCHDOG: HDD Capture Health Monitor
# Alerts if daily capture hasn't succeeded in 26+ hours
- id: notify_hdd_capture_stale
  alias: "Notify HDD Capture Stale"
  description: "Alert if HDD capture hasn't succeeded recently"
  trigger:
    - platform: state
      entity_id: binary_sensor.hdd_capture_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ HDD Capture Health Alert"
        message: >
          HDD capture has not succeeded in over 26 hours.
          Last successful: {{ states('input_datetime.hdd_capture_last_ok') }}

          Check:
          - sensor.hvac_hdd65_today state: {{ states('sensor.hvac_hdd65_today') }}
          - sensor.hvac_cdd65_today state: {{ states('sensor.hvac_cdd65_today') }}
          - sensor.hvac_outdoor_temp_hartford_proxy state: {{ states('sensor.hvac_outdoor_temp_hartford_proxy') }}

# WATCHDOG: Runtime per HDD Capture Health Monitor
- id: notify_runtime_per_hdd_capture_stale
  alias: "Notify Runtime/HDD Capture Stale"
  description: "Alert if runtime/HDD capture hasn't succeeded recently"
  trigger:
    - platform: state
      entity_id: binary_sensor.runtime_per_hdd_capture_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ Runtime/HDD Capture Alert"
        message: >
          Runtime per HDD capture has not succeeded in over 26 hours.
          Last successful: {{ states('input_datetime.runtime_per_hdd_capture_last_ok') }}

          Check:
          - sensor.hvac_total_runtime_per_hdd_today: {{ states('sensor.hvac_total_runtime_per_hdd_today') }}

# WATCHDOG: Furnace Cycle Capture Health Monitor
- id: notify_furnace_cycle_capture_stale
  alias: "Notify Furnace Cycle Capture Stale"
  description: "Alert if furnace cycle capture hasn't succeeded recently"
  trigger:
    - platform: state
      entity_id: binary_sensor.furnace_cycle_capture_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ Furnace Cycle Capture Alert"
        message: >
          Furnace min/cycle capture has not succeeded in over 26 hours.
          Last successful: {{ states('input_datetime.furnace_cycle_capture_last_ok') }}

          Check:
          - sensor.hvac_furnace_min_per_cycle: {{ states('sensor.hvac_furnace_min_per_cycle') }}
          - sensor.hvac_furnace_cycles_today: {{ states('sensor.hvac_furnace_cycles_today') }}

# WATCHDOG: Monthly Report Capture Health Monitor
- id: notify_monthly_report_stale
  alias: "Notify Monthly Report Stale"
  description: "Alert on day 2+ if monthly report wasn't captured for previous month"
  trigger:
    - platform: state
      entity_id: binary_sensor.monthly_report_stale
      to: "on"
      for:
        hours: 6
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ Monthly Report Missing"
        message: >
          Monthly HVAC report may not have been captured for the previous month.
          Last monthly capture: {{ states('input_datetime.monthly_tracking_capture_last_ok') }}

          Check reports/hvac_monthly.csv for the expected row.
          If missing, data must be manually reconstructed from daily CSV.

# WATCHDOG: Climate Norms Staleness Monitor
- id: notify_climate_norms_stale
  alias: "Notify Climate Norms Stale"
  description: "Alert if climate norms data doesn't match today"
  trigger:
    - platform: state
      entity_id: binary_sensor.climate_norms_stale
      to: "on"
      for:
        hours: 2
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ Climate Norms Data Stale"
        message: >
          Climate norms day_of_year doesn't match today, or sensor is unavailable.

          Sensor status: {{ states('sensor.climate_norms_today') }}
          Sensor DOY: {{ state_attr('sensor.climate_norms_today', 'day_of_year') }}
          Actual DOY: {{ now().timetuple().tm_yday }}

          Check:
          - Python script /config/scripts/climate_norms_today.py
          - CSV file /config/climate_daily_norms.csv

# STARTUP VALIDATION: Check for corrupt cumulative values
- id: validate_input_numbers_startup
  alias: "Validate Input Numbers on Startup"
  description: "Check for implausible values in cumulative trackers"
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay:
        seconds: 60
    - choose:
        # Check for corrupt HDD cumulative values
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_number.hdd_cumulative_year_auto') | float(0) > 8000 or
                   states('input_number.hdd_cumulative_month_auto') | float(0) > 2500 or
                   states('input_number.hdd_cumulative_year_auto') | float(0) < 0 or
                   states('input_number.hdd_cumulative_month_auto') | float(0) < 0 }}
          sequence:
            - service: system_log.write
              data:
                message: >
                  WARNING: HDD cumulative values appear corrupt.
                  Year: {{ states('input_number.hdd_cumulative_year_auto') }},
                  Month: {{ states('input_number.hdd_cumulative_month_auto') }}
                level: warning
            - service: persistent_notification.create
              data:
                title: "⚠️ HDD Data Validation Warning"
                message: >
                  HDD cumulative values may be corrupt:
                  - Year-to-date: {{ states('input_number.hdd_cumulative_year_auto') }} HDD
                  - Month-to-date: {{ states('input_number.hdd_cumulative_month_auto') }} HDD

                  Please verify and manually correct if needed.
                  Reasonable values: Year < 8000, Month < 2500
    - choose:
        # Check for corrupt filter runtime
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_number.hvac_filter_runtime_hours') | float(0) > 2000 or
                   states('input_number.hvac_filter_runtime_hours') | float(0) < 0 }}
          sequence:
            - service: system_log.write
              data:
                message: >
                  WARNING: Filter runtime appears corrupt: {{ states('input_number.hvac_filter_runtime_hours') }} hours
                level: warning
            - service: persistent_notification.create
              data:
                title: "⚠️ Filter Runtime Warning"
                message: >
                  Filter runtime value appears corrupt: {{ states('input_number.hvac_filter_runtime_hours') }} hours
                  Expected range: 0-1500 hours
    - choose:
        # Check outdoor temp trackers initialization
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_number.outdoor_temp_daily_high') | float(0) <= -49 and
                   states('input_number.outdoor_temp_daily_low') | float(150) >= 149 }}
          sequence:
            - service: system_log.write
              data:
                message: "INFO: Outdoor temp daily high/low at initial values - will auto-correct when sensor available"
                level: info
    - choose:
        # Check CDD cumulative values
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_number.cdd_cumulative_year_auto') | float(0) > 2500 or
                   states('input_number.cdd_cumulative_month_auto') | float(0) > 500 or
                   states('input_number.cdd_cumulative_year_auto') | float(0) < 0 or
                   states('input_number.cdd_cumulative_month_auto') | float(0) < 0 }}
          sequence:
            - service: system_log.write
              data:
                message: >
                  WARNING: CDD cumulative values appear corrupt.
                  Year: {{ states('input_number.cdd_cumulative_year_auto') }},
                  Month: {{ states('input_number.cdd_cumulative_month_auto') }}
                level: warning
            - service: persistent_notification.create
              data:
                title: "⚠️ CDD Data Validation Warning"
                message: >
                  CDD cumulative values may be corrupt:
                  - Year-to-date: {{ states('input_number.cdd_cumulative_year_auto') }} CDD
                  - Month-to-date: {{ states('input_number.cdd_cumulative_month_auto') }} CDD

                  Reasonable values: Year < 2500, Month < 500
    - choose:
        # Check AC runtime accumulators for corrupt values
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_number.ac_runtime_year_acc') | float(0) > 5000 or
                   states('input_number.ac_runtime_month_acc') | float(0) > 750 or
                   states('input_number.ac_runtime_year_acc') | float(0) < 0 or
                   states('input_number.ac_runtime_month_acc') | float(0) < 0 }}
          sequence:
            - service: system_log.write
              data:
                message: >
                  WARNING: AC runtime accumulators appear corrupt.
                  Year: {{ states('input_number.ac_runtime_year_acc') }}h,
                  Month: {{ states('input_number.ac_runtime_month_acc') }}h
                level: warning
            - service: persistent_notification.create
              data:
                title: "⚠️ AC Runtime Accumulator Warning"
                message: >
                  AC runtime accumulator values may be corrupt:
                  - Year-to-date: {{ states('input_number.ac_runtime_year_acc') }}h
                  - Month-to-date: {{ states('input_number.ac_runtime_month_acc') }}h

                  Reasonable values: Year < 5000h, Month < 750h
    - choose:
        # Check 7-day sliding window slots for negative values (sign corruption)
        - conditions:
            - condition: template
              value_template: >
                {% set hdd_slots = [
                  states('input_number.hdd_day_1') | float(0),
                  states('input_number.hdd_day_2') | float(0),
                  states('input_number.hdd_day_3') | float(0),
                  states('input_number.hdd_day_4') | float(0),
                  states('input_number.hdd_day_5') | float(0),
                  states('input_number.hdd_day_6') | float(0),
                  states('input_number.hdd_day_7') | float(0)
                ] %}
                {% set cdd_slots = [
                  states('input_number.cdd_day_1') | float(0),
                  states('input_number.cdd_day_2') | float(0),
                  states('input_number.cdd_day_3') | float(0),
                  states('input_number.cdd_day_4') | float(0),
                  states('input_number.cdd_day_5') | float(0),
                  states('input_number.cdd_day_6') | float(0),
                  states('input_number.cdd_day_7') | float(0)
                ] %}
                {{ (hdd_slots | select('<', 0) | list | count > 0) or
                   (hdd_slots | select('>', 65) | list | count > 0) or
                   (cdd_slots | select('<', 0) | list | count > 0) or
                   (cdd_slots | select('>', 50) | list | count > 0) }}
          sequence:
            - service: system_log.write
              data:
                message: >
                  WARNING: HDD or CDD 7-day sliding window slots contain out-of-range values.
                  HDD slots: {{ [states('input_number.hdd_day_1')|float(0), states('input_number.hdd_day_2')|float(0), states('input_number.hdd_day_3')|float(0), states('input_number.hdd_day_4')|float(0), states('input_number.hdd_day_5')|float(0), states('input_number.hdd_day_6')|float(0), states('input_number.hdd_day_7')|float(0)] }},
                  CDD slots: {{ [states('input_number.cdd_day_1')|float(0), states('input_number.cdd_day_2')|float(0), states('input_number.cdd_day_3')|float(0), states('input_number.cdd_day_4')|float(0), states('input_number.cdd_day_5')|float(0), states('input_number.cdd_day_6')|float(0), states('input_number.cdd_day_7')|float(0)] }}
                level: warning
            - service: persistent_notification.create
              data:
                title: "⚠️ Degree-Day Window Corruption"
                message: >
                  One or more HDD/CDD 7-day sliding window slots contain out-of-range
                  values (negative or > physical maximum). SPC calculations may be skewed.
                  Check Developer Tools → input_number.hdd_day_1 through hdd_day_7
                  and cdd_day_1 through cdd_day_7.

