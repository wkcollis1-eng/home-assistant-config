# =============================================================================
# Basement Temp/Humidity Sensor Node  —  XIAO ESP32-C3 + Adafruit SHT45 (PID 6174)
# -----------------------------------------------------------------------------
# Rev 2.1  (2026-07-20)
# Rev 2.1 changes (display resilience + tuning):
#   * RH band thresholds mirrored into restore_value globals -> page 2 band
#     readout survives node reboots during WiFi/HA outages (was: NaN each boot)
#   * Display tuning from HA input_numbers (single source of truth, mirrored
#     to restore globals with sane firmware defaults): lux wake threshold,
#     blank minutes, contrast %
#   * Max-on probe (30 min): display force-blanks, then only GENUINE ambient
#     light re-wakes it within ~2 s -> OLED self-glow cannot latch the display
#     on (lux sensor top-mounted; OLED may be the brightest source in the room)
#   * Contrast dimmed (default 30%) + runtime set_contrast from HA
#   * Pixel-shift wear-leveling: layout shifts 0-3 px X / 0-1 px Y every 5 min
#   * Smoothed-RH entity moved to platform: copy (phase-locked to real reads;
#     was a free-running template timer that could double/skip samples)
#   * Best-effort I2C bus-clear (9 SCL pulses) before the recovery reboot --
#     releases a slave stuck holding SDA, which an ESP reboot alone cannot
#   * Free-heap diagnostic sensor (slow-leak drift visible in HA)
#   * LED heartbeat blip widened 100 -> 200 ms (100 ms poll could skip blips)
# Rev 2.0  (2026-07-02)
# Sensor/control policy:
#   * SHT45 high-repeatability reads (precision: High -> 0xFD, 0.08 %RH noise)
#   * 10 s update interval (self-heating negligible; see DESIGN.md)
#   * RAW humidity is the control + stall-detector source (NO smoothing)
#   * A separate median-5 entity exists ONLY for the dashboard (cosmetic
#     spike rejection) and must NOT be used by control or stall logic
# Hardened for headless, always-USB-powered deployment:
#   * WiFi reboot-on-loss + AP/captive-portal fallback
#   * api reboot_timeout: 0s  -> HA outages do NOT stop local sampling
#   * I2C stale-data watchdog + bus-stall auto-recovery (reboot)
#   * Status LED: slow heartbeat = healthy, fast strobe = fault
# Logging over native USB Serial/JTAG (frees UART0/GPIO20 for the LED).
# First flash over USB, then OTA.
# =============================================================================

esphome:
  name: basement-th-node
  friendly_name: Basement TH Node
  on_boot:
    priority: -100
    then:
      - output.turn_off: status_led_out
      - lambda: |-
          id(panel).turn_off();                              // OLED starts dark; lux gate wakes it
          id(panel).set_contrast(id(g_contrast_pct) / 100.0f);  // apply restored/default contrast

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

debug:
  update_interval: 60s   # feeds the free-heap diagnostic sensor

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 15min
  # manual_ip:
  #   static_ip: 192.168.1.50
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  ap:
    ssid: "Basement-TH Fallback"
    password: !secret ap_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

# --- Alternative transport: MQTT (uncomment, remove api: block) ---------------
# mqtt:
#   broker: !secret mqtt_broker
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   discovery: true
#   birth_message: {topic: basement-th-node/status, payload: online}
#   will_message:  {topic: basement-th-node/status, payload: offline}

i2c:
  sda: GPIO6          # D4
  scl: GPIO7          # D5
  frequency: 100000
  scan: true
  timeout: 50ms

globals:
  - id: last_read_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: i2c_healthy
    type: bool
    restore_value: no
    initial_value: 'false'
  # --- RH band thresholds, mirrored from HA + persisted (NVS). Page 2 reads
  #     THESE, not the homeassistant sensors, so the band readout survives node
  #     reboots during WiFi/HA outages. NAN until HA has reported once ever.
  - id: g_rh_on
    type: float
    restore_value: yes
    initial_value: 'NAN'
  - id: g_rh_off
    type: float
    restore_value: yes
    initial_value: 'NAN'
  # --- Display tuning, mirrored from HA input_numbers + persisted. Firmware
  #     defaults apply until HA first reports (and are what a factory-fresh
  #     flash runs with).
  - id: g_lux_wake
    type: float
    restore_value: yes
    initial_value: '12.0'     # lx; tune from HA in the mounted position
  - id: g_blank_min
    type: float
    restore_value: yes
    initial_value: '3.0'      # minutes of no above-threshold lux before blank
  - id: g_contrast_pct
    type: float
    restore_value: yes
    initial_value: '30.0'     # %; <=15% may clamp on some SSD1306 stacks
  # --- Display state + wear-leveling (volatile) --------------------------------
  - id: display_awake
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_px
    type: uint8_t
    restore_value: no
    initial_value: '0'

output:
  - platform: gpio
    pin: GPIO20         # D7 (UART0 RX; freed because logging is over USB)
    id: status_led_out

button:
  - platform: restart
    name: "Node Restart"
    id: reboot_button

sensor:
  # --- SHT45: high-repeatability, 10 s. RAW outputs (control + stall source). --
  - platform: sht4x
    address: 0x44
    precision: High          # -> 0xFD high-repeatability read (0.08 %RH noise)
    update_interval: 10s
    temperature:
      name: "Basement Temperature"
      id: basement_temp
      accuracy_decimals: 2
      filters:
        - filter_out: nan
    humidity:
      name: "Basement Humidity"        # RAW — this is the control + stall entity
      id: basement_rh
      accuracy_decimals: 2
      filters:
        - filter_out: nan
      on_value:
        then:
          - lambda: |-
              id(last_read_ms) = millis();
              id(i2c_healthy) = true;

  # --- Dashboard-only smoothed humidity: median-5 (cosmetic spike rejection). --
  # Mirrors the RAW entity; NOT to be consumed by control or stall logic.
  # platform: copy is event-driven off each real SHT45 publish (phase-locked);
  # the previous free-running template timer could double-sample or skip reads.
  - platform: copy
    source_id: basement_rh
    name: "Basement Humidity (Smoothed)"
    id: basement_rh_smoothed
    accuracy_decimals: 2
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  # --- Dew point (native component) from RAW temp + RAW humidity, deg C. -------
  - platform: dew_point
    name: "Basement Dew Point"
    id: basement_dewpoint
    temperature: basement_temp
    humidity: basement_rh

  # --- Diagnostics ------------------------------------------------------------
  - platform: wifi_signal
    name: "Node WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Node Uptime"
    update_interval: 60s
    entity_category: diagnostic
  - platform: debug          # requires the debug: component (below logger)
    free:
      name: "Node Free Heap"
      entity_category: diagnostic

  # --- Ambient light (VEML7700 0x10) — gates the OLED wake/blank. ---------------
  # On the STEMMA QT daisy-chain. Auto gain/integration (default); reads a dim
  # basement cleanly (steps gain up below ~46 lx).
  - platform: veml7700
    address: 0x10
    update_interval: 2s
    ambient_light:
      name: "Basement Lux"
      id: basement_lux
      on_value:
        then:
          - lambda: |-
              // WAKE threshold from HA (g_lux_wake, default 12 lx) — tune in the
              // mounted position via input_number.basement_display_lux_wake.
              // Self-latch breaker: the OLED sits flush behind the clear cover and
              // may be the brightest source in the room, so its own glow can hold
              // lux above threshold. The max-on probe force-blanks after 30 min;
              // with the panel dark, only GENUINE ambient light re-wakes it on the
              // next reading (<=2 s blip under real lights, permanent sleep in a
              // truly dark room). Probe starts only on the off->on transition, so
              // routine re-arms never reset it.
              if (id(basement_lux).state >= id(g_lux_wake)) {
                if (!id(display_awake)) {
                  id(display_awake) = true;
                  id(panel).turn_on();
                  id(max_on_probe).execute();        // single 30-min countdown per wake
                }
                id(display_blank_timer).execute();   // restart-mode: re-arms blank countdown
              }

  # --- Dehumidifier RH band thresholds, imported from HA (single source of truth).
  # Numeric input_number states; consumed ONLY by the page_status band readout
  # (display, not control). Requires the native api: connection (below). These are
  # id-only (internal) — not re-published to HA.
  # Each import mirrors into a restore_value global (NVS) so the value survives
  # node reboots during WiFi/HA outages; consumers read the GLOBALS.
  - platform: homeassistant
    id: rh_on_threshold
    entity_id: input_number.dehumidifier_rh_on_threshold
    on_value:
      then:
        - lambda: 'if (!std::isnan(x)) id(g_rh_on) = x;'
  - platform: homeassistant
    id: rh_off_threshold
    entity_id: input_number.dehumidifier_rh_off_threshold
    on_value:
      then:
        - lambda: 'if (!std::isnan(x)) id(g_rh_off) = x;'

  # --- Display tuning imports (HA = single source of truth; same mirror pattern).
  - platform: homeassistant
    id: display_lux_wake_ha
    entity_id: input_number.basement_display_lux_wake
    on_value:
      then:
        - lambda: 'if (!std::isnan(x) && x > 0.0f) id(g_lux_wake) = x;'
  - platform: homeassistant
    id: display_blank_min_ha
    entity_id: input_number.basement_display_blank_min
    on_value:
      then:
        - lambda: 'if (!std::isnan(x) && x >= 1.0f) id(g_blank_min) = x;'
  - platform: homeassistant
    id: display_contrast_ha
    entity_id: input_number.basement_display_contrast_pct
    on_value:
      then:
        - lambda: |-
            if (!std::isnan(x) && x >= 5.0f && x <= 100.0f) {
              id(g_contrast_pct) = x;
              id(panel).set_contrast(x / 100.0f);   // applies immediately
            }

binary_sensor:
  - platform: status
    name: "Node Status"
  - platform: template
    name: "Basement Sensor Fault"
    device_class: problem
    entity_category: diagnostic
    lambda: |-
      return !id(i2c_healthy);

interval:
  # (1) Stale-data watchdog: no successful read in 60 s -> mark unhealthy.
  - interval: 5s
    then:
      - lambda: |-
          if (id(last_read_ms) == 0) return;
          if ((millis() - id(last_read_ms)) > 60000) {
            id(i2c_healthy) = false;
          }

  # (2) LED driver: 0.5 Hz heartbeat blip when healthy, 5 Hz strobe on fault.
  - interval: 100ms
    then:
      - lambda: |-
          uint32_t now = millis();
          bool healthy = id(i2c_healthy);
          uint32_t period = healthy ? 2000 : 200;
          uint32_t on_ms  = healthy ? 200 : 100;   // 200 ms blip: a 100 ms poll can't skip it
          if ((now % period) < on_ms) id(status_led_out).turn_on();
          else                        id(status_led_out).turn_off();

  # (3) Bus-stall recovery: unhealthy for >120 s -> reboot to re-init I2C.
  - interval: 30s
    then:
      - lambda: |-
          static uint32_t unhealthy_since = 0;
          if (!id(i2c_healthy) && id(last_read_ms) != 0) {
            if (unhealthy_since == 0) unhealthy_since = millis();
            if ((millis() - unhealthy_since) > 120000) {
              ESP_LOGW("watchdog", "I2C stalled >120s; bus-clear + reboot to recover");
              // Best-effort stuck-slave bus-clear: 9 SCL pulses with SDA released
              // frees a slave stuck mid-byte holding SDA low -- an ESP reboot alone
              // does NOT (peripherals aren't power-cycled). Pin-matrix state after
              // this doesn't matter: we reboot immediately.
              gpio_reset_pin(GPIO_NUM_7);                          // SCL (D5)
              gpio_set_direction(GPIO_NUM_7, GPIO_MODE_OUTPUT_OD);
              gpio_set_level(GPIO_NUM_7, 1);
              for (int i = 0; i < 9; i++) {                        // ~100 kHz clocking
                gpio_set_level(GPIO_NUM_7, 0);
                delay_microseconds_safe(5);
                gpio_set_level(GPIO_NUM_7, 1);
                delay_microseconds_safe(5);
              }
              unhealthy_since = 0;
              id(reboot_button).press();
            }
          } else {
            unhealthy_since = 0;
          }

  # (4) OLED page cycle: advance every 15 s (harmless while the panel is blanked;
  #     also serves as burn-in wear-leveling alongside dim + auto-blank).
  - interval: 15s
    then:
      - display.page.show_next: panel

  # (5) Pixel-shift wear-leveling: walk the whole layout through 8 positions
  #     (X 0-3 px, Y 0-1 px) every 5 min so glyph edges don't camp on fixed
  #     pixels. Y capped at +1: bottom row y=44 + 18 px font ends at px 63.
  - interval: 5min
    then:
      - lambda: 'id(g_px) = (id(g_px) + 1) % 8;'

# =============================================================================
# LOCAL OLED (Adafruit 938, SSD1306 128x64) — presentation-only.
#   Two 3-row pages, font_lg (Roboto 18px), left margin x=6, rows y=0/22/44
#   (top/bottom limits + even spacing carried from battery-bank-monitor v7).
#   Page 1: Temp / RH / Dew point (deg F, converted in-lambda — sensor stays C).
#   Page 2: RH-vs-band (from HA thresholds) / condensation spread / sensor health.
#   Woken by the lux gate; sleeps via the display_blank_timer script.
#   MUST NOT feed control/stall logic (same rule as the smoothed RH entity).
# =============================================================================
font:
  - file: "gfonts://Roboto"
    id: font_lg
    size: 18          # confirm bottom row (y=44) clears 64 px on the panel

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    id: panel
    address: 0x3D     # 938 ship default (ADDR open); CONFIRM via i2c scan
    update_interval: 1s
    contrast: 30%     # dim = OLED wear scales hard with luminance; runtime-tunable from HA
    pages:
      # Page 1 — core trio (rows 0/22/44 + pixel-shift; deg F converted here only)
      - id: page_env
        lambda: |-
          const int ox = id(g_px) % 4;          // pixel-shift wear-leveling
          const int oy = (id(g_px) / 4) % 2;
          float t = id(basement_temp).state;
          if (std::isnan(t)) it.print (6+ox,  0+oy, id(font_lg), "Temp -- F");
          else          it.printf(6+ox,  0+oy, id(font_lg), "Temp %.1f F", t*9.0f/5.0f+32.0f);
          float rh = id(basement_rh).state;
          if (std::isnan(rh)) it.print (6+ox, 22+oy, id(font_lg), "RH -- %");
          else           it.printf(6+ox, 22+oy, id(font_lg), "RH %.1f %%", rh);
          float dp = id(basement_dewpoint).state;
          if (std::isnan(dp)) it.print (6+ox, 44+oy, id(font_lg), "Dew -- F");
          else           it.printf(6+ox, 44+oy, id(font_lg), "Dew %.1f F", dp*9.0f/5.0f+32.0f);

      # Page 2 — RH vs band (persisted thresholds) / spread / health
      - id: page_status
        lambda: |-
          // RH position vs the on/off setpoints. Reads the RESTORED GLOBALS, not
          // the homeassistant sensors, so the band survives node reboots during
          // WiFi/HA outages (thresholds NaN only before HA has EVER reported).
          // Shows position vs setpoints, NOT the latched appliance on/off state.
          const int ox = id(g_px) % 4;          // pixel-shift wear-leveling
          const int oy = (id(g_px) / 4) % 2;
          float rh    = id(basement_rh).state;
          float on_th = id(g_rh_on);
          float off_th= id(g_rh_off);
          if (std::isnan(rh) || std::isnan(on_th) || std::isnan(off_th))
            it.print(6+ox, 0+oy, id(font_lg), "RH band --");   // no reading / never seen HA
          else if (rh >= on_th)
            it.print(6+ox, 0+oy, id(font_lg), "RH HIGH");       // at/above ON point
          else if (rh <= off_th)
            it.print(6+ox, 0+oy, id(font_lg), "RH LOW");        // at/below OFF point
          else
            it.print(6+ox, 0+oy, id(font_lg), "RH OK");         // within the band
          float t = id(basement_temp).state, dp = id(basement_dewpoint).state;
          if (!std::isnan(t) && !std::isnan(dp))
            it.printf(6+ox, 22+oy, id(font_lg), "Spread %.1f F", (t-dp)*9.0f/5.0f);
          it.printf(6+ox, 44+oy, id(font_lg), "Sensor %s", id(i2c_healthy) ? "OK" : "FAULT");

# Display auto-blank. restart mode: each above-threshold lux reading re-arms it.
# Blank delay is HA-tunable (g_blank_min, default 3 min).
script:
  - id: display_blank_timer
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(g_blank_min) * 60000.0f);'
      - lambda: |-
          id(panel).turn_off();
          id(display_awake) = false;
      - script.stop: max_on_probe

  # Max-on probe (self-latch breaker): started ONCE per off->on transition,
  # never restarted by re-arms. 30 min after wake it force-blanks the panel;
  # with the OLED dark it emits nothing, so the next lux reading is TRUE
  # ambient — genuine light re-wakes within ~2 s (a barely visible blip),
  # OLED self-glow / cover reflection cannot. Makes display-keeps-itself-
  # awake physically impossible regardless of mounting geometry.
  - id: max_on_probe
    mode: restart
    then:
      - delay: 30min
      - lambda: |-
          id(panel).turn_off();
          id(display_awake) = false;
      - script.stop: display_blank_timer
