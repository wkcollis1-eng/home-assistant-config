type: grid
column_span: 2
cards:
  - type: heading
    heading: Month-to-Date Runtime
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_total_heat_runtime_month') | round(2) }}"
    secondary: Zone Calls Total Runtime MTD
    icon: mdi:clock-outline
    layout_options:
      grid_columns: 2
      grid_rows: 2
    color: green
    features_position: bottom
    vertical: true
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_1f_heat_runtime_month_2') | round(2) }}"
    secondary: 1F Runtime MTD
    icon: mdi:home-floor-1
    layout_options:
      grid_columns: 1
      grid_rows: 2
    color: orange
    features_position: bottom
    vertical: true
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_2f_heat_runtime_month_2') | round(2) }}"
    secondary: 2F Runtime MTD
    icon: mdi:home-floor-2
    layout_options:
      grid_columns: 1
      grid_rows: 2
    color: deep-orange
    features_position: bottom
    vertical: true
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_runtime_per_hdd_month') | round(1) }} min/HDD"
    secondary: Furnace Runtime/HDD (Month)
    icon: mdi:speedometer
    color: blue
    features_position: bottom
    vertical: true
    grid_options:
      columns: 6
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_zone_balance_month') | round(0) }}%"
    secondary: Zone Balance (Month)
    icon: mdi:scale-balance
    color: teal
    features_position: bottom
    vertical: true
    grid_options:
      columns: 6
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_furnace_runtime_month_2') | float(0) | round(1) }}h"
    secondary: Furnace Runtime (MTD)
    icon: mdi:fire
    tap_action:
      action: more-info
    entity: sensor.hvac_furnace_runtime_month_2
    vertical: true
    color: deep-orange
    features_position: bottom
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: >
      {% set overlap_min = states('sensor.hvac_zone_overlap_month') | float(0)
      %} {% set overlap_hours = overlap_min / 60 %} {{ overlap_hours | round(1)
      }} h
    secondary: >
      {% set overlap_min = states('sensor.hvac_zone_overlap_month') | float(0)
      %} {% set runtime_hours = states('sensor.hvac_furnace_runtime_month_2') |
      float(0) %} {% set runtime_min = runtime_hours * 60 %} {% if runtime_min >
      0 %}
        {{ ((overlap_min / runtime_min) * 100) | round(0) }}% of monthly runtime
      {% else %}
        Zone overlap N/A
      {% endif %}
    icon: mdi:set-center
    icon_color: >
      {% set overlap_hours = states('sensor.hvac_zone_overlap_month') | float(0)
      / 60 %} {% if overlap_hours >= 5 %}green {% elif overlap_hours >= 2.5
      %}light-green {% elif overlap_hours >= 1 %}orange {% else %}grey {% endif
      %}
    tap_action:
      action: more-info
    entity: sensor.hvac_zone_overlap_month
    vertical: true
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_chaining_index_month') | float(1) | round(2) }}"
    secondary: >
      {% set idx = states('sensor.hvac_chaining_index_month') | float(1) %} {%
      if idx >= 1.7 %}Excellent (MTD) {% elif idx >= 1.4 %}Good (MTD) {% elif
      idx >= 1.2 %}Fair (MTD) {% else %}Low (MTD){% endif %}
    icon: mdi:link-variant
    icon_color: >
      {% set idx = states('sensor.hvac_chaining_index_month') | float(1) %} {%
      if idx >= 1.7 %}green {% elif idx >= 1.4 %}light-green {% elif idx >= 1.2
      %}orange {% else %}red{% endif %}
    tap_action:
      action: more-info
    entity: sensor.hvac_chaining_index_month
    vertical: true
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_furnace_cycles_month_2') | int(0) }}"
    secondary: >
      {% set cycles = states('sensor.hvac_furnace_cycles_month_2') | int(0) %}
      {% set days = now().day %} {{ (cycles / days) | round(1) if days > 0 else
      0 }} cycles/day avg
    icon: mdi:counter
    tap_action:
      action: more-info
    entity: sensor.hvac_furnace_cycles_month_2
    vertical: true
    color: indigo
    features_position: bottom
    grid_options:
      columns: 4
      rows: 2
  - type: custom:mushroom-template-card
    primary: >-
      {{ states('sensor.hvac_furnace_min_per_cycle_month') | float(0) | round(1)
      }}
    secondary: >
      {% set mpc = states('sensor.hvac_furnace_min_per_cycle_month') | float(0)
      %} {% if mpc >= 15 %}
       Long cycles (MTD)
      {% elif mpc >= 8 %}
       Normal cycles (MTD)
      {% elif mpc >= 5 %}
       Short cycles (MTD)
      {% else %}
       Very short (MTD)
      {% endif %}
    icon: mdi:timer-cog
    tap_action:
      action: more-info
    entity: sensor.hvac_furnace_min_per_cycle_month
    vertical: true
    color: >
      {% set mpc = states('sensor.hvac_furnace_min_per_cycle_month') | float(0)
      %} {% if mpc >= 15 %}green {% elif mpc >= 10 %}light-green {% elif mpc >=
      5 %}orange {% else %}red{% endif %}
    features_position: bottom
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_ac_runtime_month') | float(0) | round(2) }}h"
    secondary: AC Runtime MTD
    icon: mdi:air-conditioner
    color: blue
    features_position: bottom
    vertical: true
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_1f_cool_runtime_month') | float(0) | round(2) }}h"
    secondary: 1F Cool MTD
    icon: mdi:home-floor-1
    color: light-blue
    features_position: bottom
    vertical: true
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.hvac_2f_cool_runtime_month') | float(0) | round(2) }}h"
    secondary: 2F Cool MTD
    icon: mdi:home-floor-2
    color: cyan
    features_position: bottom
    vertical: true
    grid_options:
      columns: 5
      rows: 2
  - type: custom:mushroom-template-card
    primary: >-
      {{ states('sensor.hvac_runtime_per_cdd_month') | float(0) | round(1) }}
      min/CDD
    secondary: AC Runtime/CDD (Month)
    icon: mdi:speedometer
    color: blue
    features_position: bottom
    vertical: true
    grid_options:
      columns: 6
      rows: 2
