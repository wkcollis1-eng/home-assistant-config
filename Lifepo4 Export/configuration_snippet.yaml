# ===============================================================
# LIFEPO4 BATTERY DATA EXPORT
# ===============================================================
# ADD to existing shell_command: block (do not create a new shell_command: key)
# Paste these lines inside the existing shell_command: section in configuration.yaml

  # Weekly LiFePO4 battery data export
  # Queries HA recorder DB, writes to /config/lifepo4_exports/data/
  # Samba access: \\homeassistant\config\lifepo4_exports\data\
  export_lifepo4_weekly: "python3 /config/scripts/lifepo4_export.py"
