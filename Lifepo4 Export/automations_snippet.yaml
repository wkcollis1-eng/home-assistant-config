# ===============================================================
# LIFEPO4 BATTERY DATA EXPORT — WEEKLY
# ===============================================================
# Paste this block into automations.yaml
#
# Timing rationale:
#   Sunday 22:30 — well clear of frozen EOD sequence (23:54:30–23:58:45)
#   Runs BEFORE end-of-day CSV writes, so no race condition
#   DB maintenance (03:00 Sun) and input_number backup (04:00 Sun) are
#   early Sunday morning of the SAME day — no conflict
#
# Output: /config/lifepo4_exports/data/ (Samba-accessible)
#   combined_output.csv          — cumulative hourly voltage (DD/MM/YYYY, appended)
#   combined_temperature.csv     — cumulative hourly temp °F (appended)
#   combined_humidity.csv        — cumulative hourly humidity % (appended)
#   high_freq_voltage/           — new weekly HF file per run
#
# Monthly workflow: open \\homeassistant\config\lifepo4_exports\data\ in Explorer,
# copy new HF file to repo + copy updated cumulative CSVs to repo.

- id: lifepo4_export_weekly
  alias: "LiFePO4 Weekly Data Export"
  description: >
    Exports battery voltage, temperature, and humidity history from HA recorder
    DB to /config/lifepo4_exports/ every Sunday night at 22:30.
    Creates one weekly high-frequency file + appends to cumulative hourly CSVs.
    Output accessible via Samba at \\homeassistant\config\lifepo4_exports\data\
  trigger:
    - platform: time
      at: "22:30:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - service: system_log.write
      data:
        message: "LiFePO4 weekly export: starting"
        level: info

    - service: shell_command.export_lifepo4_weekly

    - delay:
        seconds: 30  # allow script to finish before notification

    - service: persistent_notification.create
      data:
        title: "🔋 LiFePO4 Export Ready"
        message: >
          Weekly battery data exported to Samba.
          Path: \\homeassistant\config\lifepo4_exports\data\
          — New HF file: high_freq_voltage\voltage_data_{{ (now() - timedelta(days=6)).strftime('%Y-%m-%d') }}_to_{{ now().strftime('%Y-%m-%d') }}.csv
          — Hourly CSVs updated: combined_output.csv, combined_temperature.csv, combined_humidity.csv
        notification_id: lifepo4_export_ready

    - service: system_log.write
      data:
        message: "LiFePO4 weekly export: completed"
        level: info
