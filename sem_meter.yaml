      value_template: "{{ ((value_json.sense[17][3] | float(0)) * 0.001) | round(3) }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "SEM Whole Home Energy"
      unique_id: sem_whole_home_energy
      state_topic: "SEMMETER/9070690B543A/HA"
      value_template: >-
        {% set s = value_json.sense %}
        {{ (((s[16][3] | float(0)) + (s[17][3] | float(0))) * 0.001) | round(3) }}
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing


# =====================================================================
# Utility meters — daily/monthly reset windows for the analysis circuits.
# Replicate the 2-line pattern for any other *_energy sensor you want
# windowed; for the Energy dashboard alone, the total_increasing sensors
# above are enough (HA aggregates them itself).
# NOTE: merges with the existing top-level utility_meter: (dehumidifier).
# =====================================================================
utility_meter:
  sem_whole_home_daily:
    source: sensor.sem_whole_home_energy
    name: "SEM Whole Home Daily"
    cycle: daily
  sem_whole_home_monthly:
    source: sensor.sem_whole_home_energy
    name: "SEM Whole Home Monthly"
    cycle: monthly

  sem_ac_daily:
    source: sensor.sem_ac_energy
    name: "SEM AC Daily"
    cycle: daily
  sem_ac_monthly:
    source: sensor.sem_ac_energy
    name: "SEM AC Monthly"
    cycle: monthly

  sem_furnace_daily:
    source: sensor.sem_furnace_energy
    name: "SEM Furnace Daily"
    cycle: daily
  sem_furnace_monthly:
    source: sensor.sem_furnace_energy
    name: "SEM Furnace Monthly"
    cycle: monthly

  sem_fridge_daily:
    source: sensor.sem_fridge_energy
    name: "SEM Fridge Daily"
    cycle: daily
  sem_fridge_monthly:
    source: sensor.sem_fridge_energy
    name: "SEM Fridge Monthly"
    cycle: monthly

  sem_dryer_daily:
    source: sensor.sem_dryer_energy
    name: "SEM Dryer Daily"
    cycle: daily
  sem_dryer_monthly:
    source: sensor.sem_dryer_energy
    name: "SEM Dryer Monthly"
    cycle: monthly
